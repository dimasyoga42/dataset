name: Dye Weapon Screenshot
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      # HAPUS step "Install Chromium" — puppeteer sudah bundled Chromium sendiri
      # Tidak perlu: npx puppeteer browsers install chrome

      - name: Run Screenshot Script
        run: node run.js

      - name: Commit Screenshot
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "update dye screenshot" || echo "no changes"
          git push || echo "nothing to push"
