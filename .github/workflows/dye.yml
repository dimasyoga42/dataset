name: screenshot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install cheerio axios
      - run: npm uninstall puppeteer-core
      - run: npm install puppeteer

      - run: node run.js
      - run: node colors.js

      - name: commit
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git pull
          git add .
          git commit -m "update screenshot" || echo "no change"
          git push
