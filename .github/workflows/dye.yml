name: screenshot
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install cheerio axios puppeteer canvas

      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Run screenshot
        run: node run.js
      - name: Run dye json
        run: node dye.js
      - name: Run xtal json
        run: node colors.js
      - name: Run generate image
        run: node canvas.js
      - name: Run Skill
        run: node skill.js

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add .
          git diff --cached --quiet && echo "No changes, skipping commit" && exit 0
          git commit -m "update screenshot $(date +'%Y-%m-%d %H:%M:%S')"
          git push
