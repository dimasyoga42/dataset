name: screenshot

on:
schedule:
  - cron: "0 * * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
run:
runs-on: ubuntu-latest
steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    run: npm install axios cheerio puppeteer

  - name: Run scripts
    run: |
      node run.js
      node colors.js

  - name: Commit changes
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "github-actions@github.com"
      git pull
      git add .
      git commit -m "update screenshot" || echo "no change"
      git push
